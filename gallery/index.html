<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="overlay"></div>
    <header>
        <h1>Art Gallery</h1>
    </header>
    <main class="gallery-container">
        <div class="gallery-item">
            <img src="images/art1.webp" alt="Abstract Painting">
            <div class="art-info">
                <h2>Abstract Painting</h2>
                <p>Artist Name</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="images/art2.webp" alt="Minimalist Art">
            <div class="art-info">
                <h2>Minimalist Art</h2>
                <p>Artist Name</p>
            </div>
        </div>
        <div class="gallery-item">
            <img src="images/art3.webp" alt="Surrealist Painting">
            <div class="art-info">
                <h2>Surrealist Painting</h2>
                <p>Artist Name</p>
            </div>
        </div>
    </main>
</body>
</html>
